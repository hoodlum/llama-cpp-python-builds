name: Build llama-cpp-python for RTX 5070 Ti (Blackwell)

on:
  workflow_dispatch:
    inputs:
      llama_cpp_python_version:
        description: 'llama-cpp-python version (e.g. 0.3.7 or leave empty for latest)'
        required: false
        default: ''
      cuda_version:
        description: 'CUDA Toolkit version'
        required: false
        default: '12.8.0'

env:
  # Enable GitHub Actions cache for sccache
  SCCACHE_GHA_ENABLED: "true"

jobs:
  build-windows:
    name: Build Windows Wheel (Python ${{ matrix.python-version }})
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.8

      - name: Cache CUDA
        id: cache-cuda
        uses: actions/cache@v4
        with:
          path: 'C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v12.8'
          key: ${{ runner.os }}-cuda-${{ github.event.inputs.cuda_version || '12.8.0' }}

      - name: Install CUDA Toolkit ${{ github.event.inputs.cuda_version }}
        if: steps.cache-cuda.outputs.cache-hit != 'true'
        uses: Jimver/cuda-toolkit@v0.2.21
        id: cuda-toolkit
        with:
          cuda: ${{ github.event.inputs.cuda_version }}
          method: 'network'
          sub-packages: '["nvcc", "cudart", "cublas", "curand", "cusolver", "cusparse", "visual_studio_integration"]'

      - name: Set CUDA Environment
        run: |
          echo "CUDA_PATH=C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v12.8" >> $GITHUB_ENV
          echo "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v12.8\bin" >> $GITHUB_PATH
        shell: bash

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools wheel scikit-build-core cmake ninja

      - name: Build Wheel
        shell: pwsh
        env:
          # Blackwell CC 12.0 for RTX 5070 Ti
          # Use sccache as compiler launcher
          CMAKE_ARGS: "-DGGML_CUDA=on -DCMAKE_CUDA_ARCHITECTURES=120 -DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache"
          FORCE_CMAKE: "1"
        run: |
          $version = "${{ github.event.inputs.llama_cpp_python_version }}"
          if ($version -eq "") {
            python -m pip wheel llama-cpp-python --no-binary llama-cpp-python --wheel-dir=dist --no-deps
          } else {
            python -m pip wheel "llama-cpp-python==$version" --no-binary llama-cpp-python --wheel-dir=dist --no-deps
          }

      - name: Show sccache stats
        run: sccache --show-stats

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: llama-cpp-python-win-py${{ matrix.python-version }}-cuda${{ github.event.inputs.cuda_version }}
          path: dist/*.whl

  build-linux:
    name: Build Linux Wheel (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.8

      - name: Cache CUDA
        id: cache-cuda
        uses: actions/cache@v4
        with:
          path: '/usr/local/cuda-12.8'
          key: ${{ runner.os }}-cuda-${{ github.event.inputs.cuda_version || '12.8.0' }}

      - name: Install CUDA Toolkit ${{ github.event.inputs.cuda_version }}
        if: steps.cache-cuda.outputs.cache-hit != 'true'
        uses: Jimver/cuda-toolkit@v0.2.21
        id: cuda-toolkit
        with:
          cuda: ${{ github.event.inputs.cuda_version }}
          method: 'network'

      - name: Set CUDA Environment
        run: |
          echo "CUDA_PATH=/usr/local/cuda-12.8" >> $GITHUB_ENV
          echo "/usr/local/cuda-12.8/bin" >> $GITHUB_PATH
          echo "LD_LIBRARY_PATH=/usr/local/cuda-12.8/lib64:$LD_LIBRARY_PATH" >> $GITHUB_ENV
        shell: bash

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools wheel scikit-build-core cmake ninja

      - name: Build Wheel
        env:
          # Blackwell CC 12.0 for RTX 5070 Ti
          CMAKE_ARGS: "-DGGML_CUDA=on -DCMAKE_CUDA_ARCHITECTURES=120 -DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache"
          FORCE_CMAKE: "1"
        run: |
          version="${{ github.event.inputs.llama_cpp_python_version }}"
          if [ -z "$version" ]; then
            python -m pip wheel llama-cpp-python --no-binary llama-cpp-python --wheel-dir=dist --no-deps
          else
            python -m pip wheel "llama-cpp-python==$version" --no-binary llama-cpp-python --wheel-dir=dist --no-deps
          fi

      - name: Show sccache stats
        run: sccache --show-stats

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: llama-cpp-python-linux-py${{ matrix.python-version }}-cuda${{ github.event.inputs.cuda_version }}
          path: dist/*.whl
